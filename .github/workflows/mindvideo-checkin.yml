name: MindVideo Daily Check-in

on:
  schedule:
    # MINDVIDEO_TOKEN at 05:07 Asia/Taipei.
    - cron: "7 21 * * *"
    # MINDVIDEO_TOKEN2 at 05:22 Asia/Taipei.
    - cron: "22 21 * * *"
  workflow_dispatch:

jobs:
  checkin-token-1:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '7 21 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run MindVideo check-in for MINDVIDEO_TOKEN
        env:
          MINDVIDEO_TOKEN: ${{ secrets.MINDVIDEO_TOKEN }}
          MINDVIDEO_LANG: zh-TW
        run: npm run checkin

  checkin-token-2:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '22 21 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run MindVideo check-in for MINDVIDEO_TOKEN2
        env:
          MINDVIDEO_TOKEN2: ${{ secrets.MINDVIDEO_TOKEN2 }}
          MINDVIDEO_LANG: zh-TW
        run: npm run checkin
