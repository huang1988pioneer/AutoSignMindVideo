name: MindVideo Daily Check-in

on:
  schedule:
    # Asia/Taipei 05:08 every day.
    - cron: "8 21 * * *"
    # Asia/Taipei 11:08 every day.
    - cron: "8 3 * * *"
    # Asia/Taipei 17:08 every day.
    - cron: "8 9 * * *"
    # Asia/Taipei 23:08 every day.
    - cron: "8 15 * * *"
  workflow_dispatch:

jobs:
  checkin-token-1:
    name: checkin-token-1 goldshoot0720
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '8 21 * * *' || github.event.schedule == '8 3 * * *' || github.event.schedule == '8 9 * * *' || github.event.schedule == '8 15 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run MindVideo check-in for MINDVIDEO_TOKEN1
        env:
          MINDVIDEO_TOKEN1: ${{ secrets.MINDVIDEO_TOKEN1 }}
          MINDVIDEO_LANG: zh-TW
          GH_SECRETS_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
        run: npm run checkin

