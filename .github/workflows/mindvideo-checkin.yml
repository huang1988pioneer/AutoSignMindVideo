name: MindVideo Daily Check-in

on:
  schedule:
    # Runs daily at 09:05 Asia/Taipei.
    - cron: "5 1 * * *"
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run MindVideo check-in
        env:
          MINDVIDEO_TOKEN: ${{ secrets.MINDVIDEO_TOKEN }}
          MINDVIDEO_TOKEN2: ${{ secrets.MINDVIDEO_TOKEN2 }}
          MINDVIDEO_TOKEN3: ${{ secrets.MINDVIDEO_TOKEN3 }}
          MINDVIDEO_LANG: zh-TW
        run: npm run checkin
