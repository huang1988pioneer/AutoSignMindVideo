name: MindVideo Daily Check-in

on:
  schedule:
    # Asia/Taipei 05:07 every day.
    - cron: "7 21 * * *"
    # Asia/Taipei 17:07 every day.
    - cron: "7 9 * * *"
  workflow_dispatch:

jobs:
  checkin-token-1:
    name: checkin-token-1 goldshoot0720
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '7 21 * * *' || github.event.schedule == '7 9 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run MindVideo check-in for MINDVIDEO_TOKEN1
        env:
          MINDVIDEO_TOKEN1: ${{ secrets.MINDVIDEO_TOKEN1 }}
          MINDVIDEO_LANG: zh-TW
          GH_SECRETS_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
        run: npm run checkin

