name: MindVideo Daily Check-in

on:
  schedule:
    # Asia/Taipei 05:07-06:17, one account every 7 minutes.
    - cron: "7 21 * * *"
    - cron: "14 21 * * *"
    - cron: "21 21 * * *"
    - cron: "28 21 * * *"
    - cron: "35 21 * * *"
    - cron: "42 21 * * *"
    - cron: "49 21 * * *"
    - cron: "56 21 * * *"
    - cron: "3 22 * * *"
    - cron: "10 22 * * *"
    - cron: "17 22 * * *"
  workflow_dispatch:

jobs:
  checkin-token-1:
    name: checkin-token-1 goldshoot0720
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '7 21 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run MindVideo check-in for MINDVIDEO_TOKEN
        env:
          MINDVIDEO_TOKEN: ${{ secrets.MINDVIDEO_TOKEN }}
          MINDVIDEO_LANG: zh-TW
        run: npm run checkin

  checkin-token-2:
